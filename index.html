<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="買い物リストを共有できるアプリ" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SOUIEBA!" />
    <title>SOUIEBA! - 買い物リスト共有</title>
    <script>
      const query = matchMedia("(prefers-color-scheme: dark)");
      const applyTheme = () => {
        const stored = localStorage.getItem("theme");
        const dark = stored === "dark" || (stored !== "light" && query.matches);
        document.documentElement.classList.toggle("dark", dark);
      };
      applyTheme();
      query.addEventListener("change", applyTheme);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
